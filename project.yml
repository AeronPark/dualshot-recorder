name: DualShot
options:
  bundleIdPrefix: com.midcurve
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  DualShot:
    type: application
    platform: iOS
    sources:
      - path: DualShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.midcurve.dualshot
        PRODUCT_NAME: DualShot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: DualShot
        INFOPLIST_KEY_NSCameraUsageDescription: "DualShot needs camera access to record video from both cameras simultaneously."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "DualShot needs microphone access to record audio with your videos."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "DualShot needs permission to save recorded videos to your Photos library."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

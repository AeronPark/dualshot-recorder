name: DualShot
options:
  bundleIdPrefix: com.midcurve
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: DualShot/Info.plist

targets:
  DualShot:
    type: application
    platform: iOS
    sources:
      - path: DualShot
        excludes:
          - "*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.midcurve.dualshot
        PRODUCT_NAME: DualShot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: DualShot/Info.plist
      properties:
        UILaunchScreen: {}
